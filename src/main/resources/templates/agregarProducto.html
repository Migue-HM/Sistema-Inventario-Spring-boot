<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/cabecero::cabecero-seccion(titulo='Inventario')}"/>
<body>
<!--DIV para el menu de navehacion -->
<div th:replace="~{fragmentos/navegacion::navegacion-seccion}"/>

<div class="container">
    <div class="container text-center" style="margin:30px">
        <h3> Agregar Producto</h3>
    </div>

    <div class="container">
        <form action="/agregar" modelAttribute="productoForma" method="post">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" class="form-control" name="nombre" placeholder="Nombre del prodcuto." required="true">
            </div>
            <div class="mb-3">
                <label for="precio" class="form-label">Precio</label>
                <input type="number" id="precio" class="form-control" name="precio" placeholder="Precio del prodcuto" step="0.01" required="true">
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-sm me'3">Guardar</button>
                <a href="/" class=" btn btn-danger btn-sm">Regresar</a>
            </div>

        </form>
    </div>

</div>

<div th:replace="~{fragmentos/pie-pagina::pie-pagina-seccion}"/>
</body>
</html>
