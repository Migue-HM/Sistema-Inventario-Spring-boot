<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragmentos/cabecero::cabecero-seccion(titulo='Inventario')}">
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div th:replace="~{fragmentos/navegacion::navegacion-seccion}"/>

<div class="container" style="margin-top:30px">
    <h3>Editar producto</h3>

    <form th:action="@{/editar/{id}(id=${productoForma.idProducto})}" th:object="${productoForma}" method="post">
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Estatus</label>
            <select class="form-select" th:field="*{activo}">
                <option value="true">Activo</option>
                <option value="false">Inactivo</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
    </form>
</div>
<div th:replace="~{fragmentos/pie-pagina::pie-pagina-seccion}"/>

</body>
</html>
