<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragmentos/cabecero::cabecero-seccion(titulo='Inventario')}" />
<body class="bg-light"> <div th:replace="~{fragmentos/navegacion::navegacion-seccion}" />

<div class="container my-5">

    <div class="row mb-4 align-items-center">
        <div class="col-md-6">
            <h2 class="fw-bold text-dark m-0">Historial de Inventario</h2>
        </div>

        <div class="col-md-6 text-md-end mt-3 mt-md-0">
            <div class="btn-group" role="group" aria-label="Filtros de movimiento">
                <a th:href="@{/historial}"
                   class="btn btn-outline-secondary"
                   th:classappend="${tipoSeleccionado == null} ? 'active'">
                    Todos
                </a>

                <a th:href="@{/historial(tipo='ENTRADA')}"
                   class="btn btn-outline-success"
                   th:classappend="${tipoSeleccionado == T(com.sistemainventario.modelo.Historial.TipoMovimiento).ENTRADA} ? 'active'">
                    <i class="bi bi-arrow-down-circle me-1"></i> Entradas
                </a>

                <a th:href="@{/historial(tipo='SALIDA')}"
                   class="btn btn-outline-danger"
                   th:classappend="${tipoSeleccionado == T(com.sistemainventario.modelo.Historial.TipoMovimiento).SALIDA} ? 'active'">
                    <i class="bi bi-arrow-up-circle me-1"></i> Salidas
                </a>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark text-center">
                    <tr>
                        <th scope="col" class="py-3">Fecha</th>
                        <th scope="col" class="py-3">Producto</th>
                        <th scope="col" class="py-3">Movimiento</th>
                        <th scope="col" class="py-3">Cantidad</th>
                        <th scope="col" class="py-3">Usuario</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(historial)}">
                        <td colspan="5" class="text-center py-4 text-muted">
                            No se encontraron movimientos para este filtro.
                        </td>
                    </tr>
                    <tr th:each="movimiento: ${historial}" class="text-center">
                        <td class="text-muted" th:text="${#temporals.format(movimiento.fecha,'dd/MM/yyyy HH:mm')}"></td>
                        <td class="fw-bold text-secondary" th:text="${movimiento.producto.nombre}"></td>
                        <td>
                                <span th:if="${movimiento.tipoMovimiento == T(com.sistemainventario.modelo.Historial.TipoMovimiento).ENTRADA}"
                                      class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2">
                                    Entrada
                                </span>
                            <span th:if="${movimiento.tipoMovimiento == T(com.sistemainventario.modelo.Historial.TipoMovimiento).SALIDA}"
                                  class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill px-3 py-2">
                                    Salida
                                </span>
                        </td>
                        <td class="fw-bold" th:text="${movimiento.cantidad}"></td>
                        <td>
                            <span class="badge bg-light text-dark border"><i class="bi bi-person me-1"></i>[[${movimiento.usuario.nombre}]]</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragmentos/pie-pagina::pie-pagina-seccion}"/>

</body>
</html>
