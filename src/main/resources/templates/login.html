<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 flex items-center justify-center min-h-screen text-gray-100 font-sans">

<div class="w-full max-w-md p-8 bg-gray-900 rounded-2xl shadow-xl border border-gray-800">

    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold tracking-tight text-white mb-2">Bienvenido de nuevo</h2>
        <p class="text-sm text-gray-400">Ingresa tus credenciales para acceder</p>
    </div>

    <div th:if="${param.error}" class="mb-4 p-3 bg-red-950/50 border border-red-800 text-red-200 text-sm rounded-lg text-center">
        Correo o contraseña incorrectos.
    </div>

    <form th:action="@{/login}" method="post" class="space-y-6">

        <div>
            <label for="correo" class="block text-sm font-medium text-gray-300 mb-2">Correo electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="Correo" required
                   class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200">
        </div>

        <div>
            <div class="flex justify-between items-center mb-2">
                <label for="password" class="block text-sm font-medium text-gray-300">Contraseña</label>
            </div>
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="Contraseña"
                   required
                   class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200">
        </div>

        <button type="submit"
                class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium rounded-lg shadow-lg hover:shadow-indigo-500/20 transition duration-200 cursor-pointer">
            Entrar
        </button>
    </form>

</div>

</body>
</html>
